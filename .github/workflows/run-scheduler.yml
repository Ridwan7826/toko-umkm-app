name: Run Daily Summary Scheduler

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to summarize (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
        coverage: none

    - name: Get Composer Cache Directory
      id: composer-cache
      run: |
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer Dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Environment
      run: |
        cp .env.example .env
        sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
        sed -i 's/DB_DATABASE=tokokita/DB_DATABASE=database\/database.sqlite/' .env
        touch database/database.sqlite
        php artisan key:generate

    - name: Run Migrations and Seeders
      run: php artisan migrate:fresh --seed --force

    - name: Run Summary Command
      run: |
        if [ -z "${{ github.event.inputs.date }}" ]; then
          php artisan summary
        else
          php artisan summary --date=${{ github.event.inputs.date }}
        fi
